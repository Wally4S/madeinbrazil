<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4S STORE • Videos</title>
<style>
body{
    margin:0;
    font-family:Segoe UI, system-ui, sans-serif;
    background:radial-gradient(circle at top,#000000,#000000);
    color:#ffffff;
}

/* TOPO */
.topo{
    display:flex;
    align-items:center;
    justify-content:center;

    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#D16812;

    position:relative;
}


/* BOTÃO VOLTAR */
.voltar{
    position:absolute;
    right:20px; /* 🔥 mudou de left pra right */
    top:20px;

    padding:8px 14px;
    background:linear-gradient(135deg,#D16812,#facc15);
    border:none;
    color:white;
    cursor:pointer;
    border-radius:20px;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(209,104,18,0.5);
}


.voltar:hover{
    transform:translateY(-2px) scale(1.05);
    box-shadow:0 6px 25px rgba(209,104,18,0.7),0 0 12px rgba(250,204,21,0.6);
}

/* BUSCA */
.busca{
    text-align:center;
    padding:15px;
}

.busca input{
    width:60%;
    padding:12px;
    border-radius:12px;
    border:1px solid #D16812;
    background:rgba(209,104,18,0.7),0 0 12px rgba(250,204,21,0.6);
.glow-text {
  color: rgba(209,104,18,0.7); /* cor principal do texto */
  text-shadow:
    0 0 5px rgba(250,204,21,0.6),
    0 0 10px rgba(250,204,21,0.5),
    0 0 12px rgba(250,204,21,0.4);
}    font-size:16px;
}

/* BADGES */
.badges{
    text-align:center;
    margin-bottom:10px;
}

.badges button{
    margin:5px;
    padding:8px 14px;
    background:#D16812;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:12px;
    transition:0.3s;
    box-shadow:0 4px 12px rgba(209,104,18,0.4);
}

.badges button.active, .badges button:hover{
    background:linear-gradient(135deg,#D16812,#facc15);
    box-shadow:0 6px 20px rgba(209,104,18,0.6),0 0 10px rgba(250,204,21,0.5);
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    padding:10px;
}

.card{
    width:260px;
    background:rgba(0,0,0,0.63);
    border:1px solid #D16812;
    border-radius:16px;
    overflow:hidden;
    transition:0.3s;
    position:relative;
    box-shadow:0 6px 20px rgba(209,104,18,0.5),0 0 12px rgba(209,104,18,0.4);
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(209,104,18,0.6),0 12px 30px rgba(0,0,0,0.6);
}

/* BADGE CREDITOS NEON */
.credito{
    position:absolute;
    top:8px;
    left:8px;
    padding:4px 10px;
    font-size:11px;
    font-weight:bold;
    background:linear-gradient(90deg,#D16812,#facc15);
    border-radius:8px;
    color:#ffffff;
    text-shadow:0 0 6px #D16812;
    letter-spacing:0.5px;
    z-index:10;
    animation:glowBadge 2s infinite alternate;
}

@keyframes glowBadge{
0%{
    box-shadow:
    0 0 5px #D16812,
    0 0 10px #facc15,
    inset 0 0 5px rgba(255,255,255,0.15);
}
100%{
    box-shadow:
    0 0 12px #facc15,
    0 0 20px #D16812,
    inset 0 0 8px rgba(255,255,255,0.25);
}
}

/* TOOLTIP */
.credito::after{
    content:attr(data-credito);
    position:absolute;
    bottom:-28px;
    left:0;
    background:rgba(0,0,0,0.85);
    border:1px solid #D16812;
    color:#facc15;
    padding:4px 8px;
    border-radius:6px;
    font-size:11px;
    white-space:nowrap;
    opacity:0;
    transform:translateY(5px);
    transition:0.2s;
    box-shadow:0 0 10px #D16812;
}

.credito:hover::after{
    opacity:1;
    transform:translateY(0);
}

/* THUMB */
.thumb{
    height:150px;
    width:100%;
    cursor:pointer;
    overflow:hidden;
    border-bottom:1px solid #D16812;
    border-radius:12px 12px 0 0;
}

.thumb video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

.titulo{
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#facc15;
    text-shadow:0 0 4px #D16812;
}

/* PAGINAÇÃO */
.paginacao{
    text-align:center;
    margin:20px 0;
}

.paginacao button{
    margin:5px;
    padding:8px 14px;
    background:#D16812;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.paginacao button:hover, .paginacao button.active{
    background:linear-gradient(135deg,#D16812,#facc15);
    box-shadow:0 4px 12px rgba(209,104,18,0.5),0 0 10px rgba(250,204,21,0.4);
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.modal video{
    width:70%;
    max-width:900px;
    border:2px solid #D16812;
    border-radius:12px;
    box-shadow:0 0 25px rgba(209,104,18,0.6);
}
@media (max-width: 768px){
  .voltar{
    right:10px;
    top:10px;
    padding:6px 10px;
    font-size:12px;
  }
}

</style>
</head>

    {titulo:"Loading", src:"/guias/test.mp4", poster:"/guias/loading.gif", categoria:"💲Farm", creditos:"Canal"},
];

let pagina = 1;
const porPagina = 8;
let categoriaAtiva = TODOS;

const grid = document.getElementById("grid");
const paginacao = document.getElementById("paginacao");
const badgesDiv = document.getElementById("badges");
const search = document.getElementById("search");
const modal = document.getElementById("modal");
const player = document.getElementById("player");

// ===== BADGES =====
function criarBadges(){
    const categorias = [TODOS, ...new Set(videos.map(v=>v.categoria))];
    badgesDiv.innerHTML="";
    categorias.forEach(cat=>{
        const btn = document.createElement("button");
        btn.innerText = cat;
        if(cat===categoriaAtiva) btn.classList.add("active");
        btn.onclick = ()=>{
            categoriaAtiva = cat;
            pagina = 1;
            criarBadges();
            render();
        }
        badgesDiv.appendChild(btn);
    });
}

// ===== RENDER =====
function render(){
    const termo = search.value.toLowerCase();
    let filtrados = videos.filter(v=>{
        const matchCategoria =
            categoriaAtiva===TODOS ||
            v.categoria===categoriaAtiva;
        const matchBusca = v.titulo.toLowerCase().includes(termo);
        return matchCategoria && matchBusca;
    });
    const inicio = (pagina-1)*porPagina;
    const fim = inicio + porPagina;
    const lista = filtrados.slice(inicio,fim);

    grid.innerHTML="";
    lista.forEach(v=>{
        const card = document.createElement("div");
        card.className="card";
       card.innerHTML=`
<div class="credito" data-credito="Créditos do Criador: ${v.creditos || "Autor"}">
🎮 ${v.creditos || "Autor"}
</div>

<div class="thumb" onclick="abrir(this)">
<video muted src="${v.src}" poster="${v.poster}"></video>
</div>

<div class="titulo">${v.titulo}</div>
`;
        grid.appendChild(card);
    });

    const totalPaginas = Math.ceil(filtrados.length/porPagina);
    paginacao.innerHTML="";
    for(let i=1;i<=totalPaginas;i++){
        const btn = document.createElement("button");
        btn.innerText=i;
        if(i===pagina) btn.classList.add("active");
        btn.onclick=()=>{pagina=i; render();}
        paginacao.appendChild(btn);
    }
}

// ===== MODAL =====
function abrir(el){
    const video = el.querySelector("video");
    player.src = video.src;
    modal.style.display = "flex";
    player.play();
}

function fechar(){
    modal.style.display = "none";
    player.pause();
    player.currentTime=0;
}

// ===== VOLTAR PARA INÍCIO =====
function voltarInicio(){
    window.location.href = "https://4sstore.vercel.app";
}

// ===== BUSCA =====
search.oninput = ()=>{pagina=1; render();}

// ===== INIT =====
criarBadges();
render();
</script>
