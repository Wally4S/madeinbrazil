.cart-box{

  /* firefox */

  scrollbar-color:#22c55e transparent;
}

/* IMAGE 👒TOPO — SEGURO + BRILHO CONTROLADO */
.image-box{
 width:100%;
 height:135px;
 position:relative;       /* 🔥 ancora tudo aqui */
 overflow:hidden;         /* 🔥 impede vazamento */
 display:flex;
 align-items:center;
 justify-content:center;
}

.image-box img{
 width:100%;
 height:100%;
 object-fit:contain;

 background:linear-gradient(
   180deg,
   #ffffff 80%,
   #ffffff 80%,
   #ffffff 100%
 );

 border-radius:18px;
 padding:12px;
 box-sizing:border-box;

 box-shadow:0 10px 26px rgba(2,6,23,.7);
 transition:
   transform .35s ease,
   box-shadow .35s ease;
}

/* ✨ brilho PASSANDO */
.image-box::after{
 content:"";
 position:absolute;
 top:0;
 left:-100%;
 width:100%;
 height:100%;
 background:linear-gradient(
   120deg,
   transparent 35%,
   rgba(255,255,255,.45) 50%,
   transparent 65%
 );
 transition:.6s ease;
 pointer-events:none;
}

.product:hover .image-box::after{
 left:100%;
}

.product:hover .image-box img{
 transform:scale(1.04);
 box-shadow:
   0 0 22px rgba(249,115,22,.55),
   0 14px 30px rgba(2,6,23,.85);
}

 transform:scale(1.04);
 box-shadow:
   0 0 0 0 rgba(0,0,0,0),
   0 0 22px rgba(249,115,22,.55);
}

position:relative;
overflow:hidden;

transition:all .25s ease;
transform:translateY(0);
}

transform:translateY(-8px) scale(1.02);

box-shadow:
0 0 25px rgba(249,115,22,.6),
0 0 50px rgba(249,115,22,.4);
}

.product-card::after{
content:"";
position:absolute;
top:0;
left:0;
width:200%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transform:translateX(-120%);

pointer-events:none;
}

opacity:1;

0%{transform:translateX(-120%)}
100%{transform:translateX(120%)}

function add(id){

  const p = productsData.find(prod => Number(prod.id) === Number(id));
  if(!p) return;

  const item = cart.find(i => Number(i.id) === Number(id));

  // quantidade atual no carrinho
  const qtyInCart = item ? item.qty : 0;

  // impedir passar do estoque
  if(qtyInCart >= p.baseStock){
    alert("❌ Estoque máximo atingido");
    return;
  }

  if(item){
    item.qty++;
  }else{
    cart.push({
      id: Number(p.id),
      name: p.name,
      price: p.price,
      qty: 1
    });
  }

  renderCart();
  updateCartBtn();
}


/* ALTERAR QUANTIDADE */

function changeQty(id, delta){

  const item = cart.find(i => Number(i.id) === Number(id));
  if(!item) return;

  const p = productsData.find(p => Number(p.id) === Number(id));
  if(!p) return;

  const newQty = item.qty + delta;

  // impedir passar do estoque
  if(newQty > p.baseStock){
    alert("❌ Estoque máximo atingido");
    return;
  }

  item.qty = newQty;

  if(item.qty <= 0){
    cart = cart.filter(i => Number(i.id) !== Number(id));
  }

  renderCart();
  updateCartBtn();
}

/* ===============================
   PATCH ESTOQUE SÓ NO CHECKOUT
   =============================== */
(function () {

  const originalCheckout = window.checkout;

  window.checkout = function () {

    // Atualiza o estoque
    cart.forEach(item => {
      const p = productsData.find(p => p.id === item.id);
      if (p) {
        p.baseStock = Math.max(0, p.baseStock - item.qty);
      }
    });

    // Salva produtos atualizados no localStorage
    localStorage.setItem(
      "products",
      JSON.stringify(
        productsData.map(p => ({ id: p.id, baseStock: p.baseStock }))
      )
    );

    // Chama o checkout original
    originalCheckout.apply(this, arguments);

    // ===============================
    // Zera o carrinho APÓS finalizar
    // ===============================
    cart = [];
    renderCart();
    render();
    closeCart();
  };

})();

    const txt = btn.innerText?.toLowerCase() || "";
    if(
      txt.includes("comprar") ||
      txt.includes("buy") ||
      txt.includes("adicionar") ||
      txt.includes("checkout")
    ){
      btn.classList.add("rpg-buy");
    }
  });

  const prices = document.querySelectorAll(
    ".price, .preco, .valor, span, strong"
  );

  prices.forEach(p=>{
    const txt = p.innerText || "";
    if(txt.match(/R\\$|\\$|\\d+,\\d{2}|\\d+\\.\\d{2}/)){
      p.classList.add("rpg-price");
    }
  });

})();
</script>

<script>
function updateProductUI(productId){
  const card = document.querySelector(`.product-card[data-id="${productId}"]`);
  if(!card) return;

  const estoqueEl = card.querySelector('.estoque');
  const promoBadge = card.querySelector('.promo-badge');
  const addBtn = card.querySelector('.add-btn');

  // pega estoque atual do texto
  let estoque = parseInt(estoqueEl.textContent.replace(/\D/g,''));

  if(estoque <= 0){
    // texto estoque
    estoqueEl.textContent = 'Estoque=: 0';

    // remove promo
    if(promoBadge) promoBadge.remove();

    // botão SEM ESTOQUE
    if(addBtn){
      addBtn.disabled = true;
      addBtn.textContent = 'SEM ESTOQUE';
      addBtn.style.background = 'linear-gradient(135deg,#dc2626,#991b1b)';
      addBtn.style.cursor = 'not-allowed';
      addBtn.style.boxShadow = '0 0 20px rgba(220,38,38,.8)';
    }
  }
}

/* ⚡ INTERCEPTA clique no botão Adicionar */
document.addEventListener('click', e=>{
  if(!e.target.classList.contains('add-btn')) return;

  const card = e.target.closest('.product-card');
  const estoqueEl = card.querySelector('.estoque');

  let estoque = parseInt(estoqueEl.textContent.replace(/\D/g,''));
  estoque--;

  estoqueEl.textContent = `Estoque: ${estoque}`;

  const id = card.dataset.id;
  updateProductUI(id);
});
</script>

<script>
(function(){
  const painel = document.getElementById("painel4s");
  const lista  = document.getElementById("lista4s");
  const busca  = document.getElementById("busca4s");

  /* ===== ABRIR COM CÓDIGO ===== */
  let buffer = "";
  document.addEventListener("keydown",e=>{
    if(e.key === "Escape"){
      painel.style.display="none";
      return;
    }
    if(e.target.tagName==="INPUT") return;

    buffer = (buffer + e.key.toLowerCase()).slice(-2);
    if(buffer === "4s"){
      painel.style.display="flex";
      busca.value="";
      renderPainel();
      buffer="";
    }
  });
const productModal = document.getElementById("productModal");
const modalName = document.getElementById("modalName");
const modalImg = document.getElementById("modalImg");
const modalPrice = document.getElementById("modalPrice");
const modalStock = document.getElementById("modalStock");
const modalAddBtn = document.getElementById("modalAddBtn");
const closeModal = document.getElementById("closeModal");

// FECHAR modal
closeModal.addEventListener("click", ()=> productModal.style.display="none");
window.addEventListener("click", e=> {
  if(e.target === productModal) productModal.style.display="none";
});

// ABRIR modal pelo ID do produto
function openProductModal(id){
  const p = productsData.find(item => item.id === id);
  if(!p) return;

  modalName.textContent = p.name;
  modalImg.src = p.img;
  modalPrice.textContent = `R$ ${p.price}`;
  modalStock.textContent = `Estoque: ${p.baseStock}`;

  modalAddBtn.onclick = ()=> add(p.id); // reusa sua função de adicionar
  productModal.style.display = "flex";
}

  /* ===== RENDER PAINEL ===== */
  function renderPainel(){
    lista.innerHTML="";
    productsData.forEach(p=>{
      const div=document.createElement("div");
      div.className="item4s";
      div.dataset.search=(p.name+" "+p.id).toLowerCase();
      div.innerHTML=`
        <strong>${p.name}</strong> (ID: ${p.id})<br>
        <div class="ctrl4s">
          <button onclick="ajuste4s(${p.id},-1)">−</button>
          
          <span>${p.baseStock}</span>
          <button onclick="ajuste4s(${p.id},1)">+</button>
        </div>
      `;
      lista.appendChild(div);
    });
  }

  /* ===== BUSCA ===== */
  busca.addEventListener("input",()=>{
    const v=busca.value.toLowerCase();
    lista.querySelectorAll(".item4s").forEach(i=>{
      i.style.display = i.dataset.search.includes(v) ? "block" : "none";
    });
  });

  /* ===== AJUSTE DE ESTOQUE ===== */
  window.ajuste4s=function(id,delta){
    const p=productsData.find(p=>p.id===id);
    if(!p) return;

    p.baseStock = Math.max(0,p.baseStock+delta);
    p.stock = p.baseStock;

    localStorage.setItem("products",JSON.stringify(productsData));
    renderPainel();
    render(); //
  };
  
})();
</script>
